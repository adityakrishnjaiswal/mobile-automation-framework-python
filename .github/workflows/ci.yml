name: Mobile Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests in mock mode (always green)
        env:
          USE_REAL_DEVICE: "0"
          RUN_MOBILE_TESTS: "false"
        run: |
          pytest --env dev --platform android --maxfail=1

      - name: Upload HTML report
        if: always() && hashFiles('reports/html/**/*.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: reports/html/**/*.html
